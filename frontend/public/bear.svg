<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 140" aria-label="Bear silhouette" fill="currentColor">
  <!-- ears -->
  <circle cx="38" cy="34" r="10"/>
  <circle cx="68" cy="28" r="10"/>
  <!-- head -->
  <ellipse cx="52" cy="56" rx="32" ry="28"/>
  <!-- snout -->
  <ellipse cx="22" cy="66" rx="14" ry="10"/>
  <!-- nose -->
  <circle cx="14" cy="64" r="3" fill="var(--background)"/>
  <!-- eye -->
  <circle cx="48" cy="50" r="3" fill="var(--background)"/>
  <!-- body -->
  <path d="M70 70 Q80 60 100 64 L150 64 Q180 64 196 84 L200 100 L188 116 L172 116 L168 104 L120 104 L116 116 L100 116 L92 104 L80 96 Z"/>
  <!-- legs -->
  <rect x="100" y="106" width="8" height="22" rx="2"/>
  <rect x="118" y="106" width="8" height="22" rx="2"/>
  <rect x="166" y="106" width="8" height="22" rx="2"/>
  <rect x="184" y="106" width="8" height="22" rx="2"/>
  <!-- back hump -->
  <path d="M150 60 Q170 50 188 68 L196 84 L150 80 Z"/>
  <!-- claws (paw) -->
  <path d="M16 72 Q18 78 22 80" stroke="currentColor" stroke-width="2" fill="none"/>
</svg>
