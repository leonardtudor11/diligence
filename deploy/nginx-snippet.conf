# Inject inside the existing server { ... } block in /etc/nginx/sites-enabled/diligence
# (must appear BEFORE the `location /` catch-all so it takes precedence).
#
# A `limit_req_zone` directive belongs in the http {} block, not here. Add
# this to /etc/nginx/nginx.conf (inside http {}) before the include of
# sites-enabled:
#
#     limit_req_zone $binary_remote_addr zone=diligence_post:10m rate=6r/m;
#
# 6 req/min/IP, burst of 6, no delay. Backed up by in-process limit in
# backend/api.py (RATE_LIMIT_BURST cold-ingests per hour per IP).

# Backend POST/SSE/GET — JSON endpoints + audio streaming.
location /api/ {
    proxy_pass http://127.0.0.1:8000;

    # SSE: disable buffering + bump timeouts so /api/research/{ticker}/stream
    # can keep the connection open during a multi-minute graph run.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # Range requests for audio — nginx forwards Range/If-Range automatically
    # as long as proxy_buffering is off (already set above).
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Tighter cap on the paid endpoint: POST /api/research/{ticker} triggers
# Gemini + Featherless + Speechmatics if the ticker is cold, so we cap
# nginx-side and let the in-process limiter in backend/api.py do the
# finer-grained per-IP cold-ingest accounting.
location ~ ^/api/research/[^/]+/?$ {
    limit_req zone=diligence_post burst=6 nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:8000;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
