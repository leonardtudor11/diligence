# Inject inside the existing server { ... } block in /etc/nginx/sites-enabled/diligence
# (must appear BEFORE the `location /` catch-all so it takes precedence).

# FastAPI backend — JSON endpoints + audio streaming + SSE.
location /api/ {
    proxy_pass http://127.0.0.1:8000;

    # SSE: disable buffering + bump timeouts so /api/research/{ticker}/stream
    # can keep the connection open during a multi-minute graph run.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # Range requests for audio — nginx forwards Range/If-Range automatically
    # as long as proxy_buffering is off (already set above).
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
